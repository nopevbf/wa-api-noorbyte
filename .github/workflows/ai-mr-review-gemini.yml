name: 🤖 AI MR Review + Test (ISTQB-Based — Gemini)

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-ai-review:
    name: Test + AI Code Review (Gemini)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Gemini SDK
        run: npm install @google/generative-ai --no-save

      - name: Run Jest tests
        id: tests
        continue-on-error: true
        run: |
          set +e
          npm test > /tmp/test_result.txt 2>&1
          TEST_EXIT_CODE=$?

          echo "TEST_EXIT_CODE=$TEST_EXIT_CODE" >> $GITHUB_ENV

          echo "===== TEST RESULT ====="
          cat /tmp/test_result.txt

          exit 0

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.js' '*.ts' '*.jsx' '*.tsx' '*.mjs' '*.cjs' | head -c 10000)
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -50 | tr '\n' ', ')

          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV
          echo "$DIFF" > /tmp/pr_diff.txt

      - name: Run AI Review (Gemini)
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
          TEST_EXIT_CODE: ${{ env.TEST_EXIT_CODE }}
        run: |
          node << 'EOF'
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);

          const diff = fs.existsSync("/tmp/pr_diff.txt")
            ? fs.readFileSync("/tmp/pr_diff.txt", "utf8")
            : "";

          const testResultRaw = fs.existsSync("/tmp/test_result.txt")
            ? fs.readFileSync("/tmp/test_result.txt", "utf8")
            : "Test result tidak ditemukan.";

          const testResult = testResultRaw.slice(-8000);
          const testExitCode = process.env.TEST_EXIT_CODE || "unknown";
          const testStatus = testExitCode === "0" ? "PASSED" : "FAILED";

          const prompt = [
            "Lo adalah Senior QA Engineer dan Code Reviewer yang expert di ISTQB standards, STLC methodology, sama Node.js / TypeScript best practices.",
            "",
            "Gaya bahasa lo: Indonesia campur dikit English, casual tapi tetep professional — ala anak Jaksel yang works in tech.",
            "Pakai kata kayak 'which is', 'literally', 'actually', 'kind of', 'basically', 'so', 'anyway', 'honestly', 'lowkey'.",
            "Vibes-nya santai tapi insightful. Jangan lebay, jangan kaku.",
            "",
            "## Konteks PR",
            "- **Judul:** " + (process.env.PR_TITLE || "N/A"),
            "- **Author:** " + (process.env.PR_AUTHOR || "N/A"),
            "- **Branch:** `" + (process.env.HEAD_BRANCH || "?") + "` ke `" + (process.env.BASE_BRANCH || "main") + "`",
            "- **File yang berubah:** " + (process.env.CHANGED_FILES || "N/A"),
            "- **Deskripsi:** " + (process.env.PR_BODY || "_(ga ada deskripsi, which is agak susah di-review tbh)_"),
            "",
            "## Hasil Automated Test",
            "- **Status:** " + testStatus,
            "- **Exit Code:** " + testExitCode,
            "",
            "```text",
            testResult || "_(test output kosong)_",
            "```",
            "",
            "## Code Diff",
            "```diff",
            diff || "_(diff kosong, mungkin binary files atau ga ada perubahan JS/TS)_",
            "```",
            "",
            "---",
            "",
            "Review PR ini dengan format Markdown yang clean buat GitHub PR comment. Spesifik ya, sebut nama file dan konteks baris kalau bisa.",
            "",
            "### 1. Rangkuman Perubahan",
            "Jelasin secara singkat ini PR ngubah apa dan ngaruh ke modul atau komponen mana aja.",
            "",
            "### 2. Hasil Automated Test",
            "- Jelaskan apakah test passed atau failed.",
            "- Kalau failed, jelaskan kemungkinan penyebab dari output test.",
            "- Kalau passed, tetap cek apakah coverage dan skenario test-nya udah meaningful.",
            "",
            "### 3. Test Coverage (ISTQB)",
            "- Unit test udah di-update buat logic yang berubah?",
            "- Happy path, negative case, boundary value (BVA), sama edge case udah ke-cover?",
            "- Assertion-nya spesifik atau masih terlalu loose?",
            "- List skenario yang belum di-test — honestly ini bagian paling penting.",
            "",
            "### 4. Code Quality",
            "- Logic-nya bener ga? Error handling-nya gimana?",
            "- Null/undefined safety — ada yang bisa meledak ga?",
            "- DRY dan SOLID — ada yang violasi?",
            "- Readability — nama variabel/fungsi-nya makes sense?",
            "- Performance — ada blocking call, loop ga perlu, atau memory risk?",
            "",
            "### 5. Security (OWASP-Aware)",
            "Flag kalau ada: input validation kurang, hardcoded secret, celah auth/authz, injection vector, XSS risk, atau sensitive data exposure.",
            "",
            "### 6. Verdict",
            "",
            "**Overall Risk:** [Low / Medium / High / Critical]",
            "",
            "**Status:** [Approved / Approved with Comments / Changes Requested]",
            "",
            "**Blocking Issues (wajib fix sebelum merge):**",
            "- Kalau automated test failed, jadikan blocking issue.",
            "- Kalau ga ada, tulis 'Ga ada, which is bagus!'",
            "",
            "**Saran non-blocking tapi worth it:**",
            "- List improvement yang ga wajib tapi bagus.",
            "",
            "**Yang udah bagus:**",
            "- List hal positif dari PR.",
            "",
            "PENTING: Gunakan emoji dan icon yang relevan di tiap section biar enak dibaca. Jangan lebay."
          ].join("\n");

          function classifyError(err) {
            const msg = err.message || "";

            if (msg.includes("429") || msg.toLowerCase().includes("rate limit") || msg.toLowerCase().includes("quota")) {
              return "rate_limit";
            }

            if (msg.includes("400") || msg.toLowerCase().includes("invalid") || msg.toLowerCase().includes("api key")) {
              return "auth";
            }

            if (msg.includes("500") || msg.includes("503") || msg.toLowerCase().includes("unavailable")) {
              return "server";
            }

            return "unknown";
          }

          async function callGeminiWithRetry(modelName, maxRetries) {
            maxRetries = maxRetries || 3;
            let lastErr;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                console.log("Attempt " + attempt + "/" + maxRetries + " — model: " + modelName);

                const model = genAI.getGenerativeModel({
                  model: modelName
                });

                const result = await model.generateContent(prompt);
                return result.response.text();
              } catch (err) {
                lastErr = err;
                const type = classifyError(err);

                console.error("Attempt " + attempt + " gagal [" + type + "]: " + err.message);

                if (type === "auth") {
                  throw err;
                }

                if (attempt < maxRetries) {
                  const waitMs = [10000, 30000, 60000][attempt - 1] || 60000;
                  console.log("Nunggu " + (waitMs / 1000) + "s sebelum retry...");
                  await new Promise(function(resolve) {
                    setTimeout(resolve, waitMs);
                  });
                }
              }
            }

            throw lastErr;
          }

          async function runReview() {
            try {
              return await callGeminiWithRetry("gemini-3-flash-preview", 3);
            } catch (flashErr) {
              console.warn("gemini-3-flash gagal, nyoba gemini-3-pro sebagai fallback...");
              return await callGeminiWithRetry("gemini-3-pro-preview", 2);
            }
          }

          function buildErrorComment(err) {
            const type = classifyError(err);

            const messages = {
              rate_limit: "> ⚠️ **Rate limit kena nih** — kuota Gemini lagi mentok.\n> Test tetap sudah dijalankan, tapi AI review gagal digenerate.\n> Review akan jalan otomatis di push berikutnya.",
              auth: "> ❌ **Auth error** — GEMINI_API_KEY ga valid atau belum di-set.\n> Cek di: **Repo Settings → Secrets → GEMINI_API_KEY**",
              server: "> 🔴 **Gemini API lagi error/down** dari sisi provider.\n> Test tetap sudah jalan, AI review bisa dicoba lagi di push berikutnya.",
              unknown: "> ⚠️ **Ada error ga terduga** — cek workflow logs buat detail-nya.\n\n```\n" + err.message + "\n```"
            };

            return [
              "## 🤖 AI Code Review — ISTQB-Based (Gemini)",
              "",
              "## 🧪 Automated Test Result",
              "",
              "- **Status:** " + testStatus,
              "- **Exit Code:** " + testExitCode,
              "",
              "```text",
              testResult || "_(test output kosong)_",
              "```",
              "",
              "---",
              "",
              messages[type] || messages.unknown,
              "",
              "---",
              "<sub>Workflow: ai-mr-review-gemini</sub>"
            ].join("\n");
          }

          (async function() {
            try {
              const review = await runReview();

              const comment = [
                "## 🤖 AI Code Review — ISTQB-Based (Gemini)",
                "",
                "> _Auto-review by Google Gemini. Ini quality gate ya, bukan pengganti human review._",
                "",
                "---",
                "",
                review,
                "",
                "---",
                "<sub>Workflow: ai-mr-review-gemini</sub>"
              ].join("\n");

              fs.writeFileSync("/tmp/review_comment.txt", comment);
              console.log("Review berhasil digenerate!");
            } catch (err) {
              console.error("Semua attempt gagal:", err.message);
              fs.writeFileSync("/tmp/review_comment.txt", buildErrorComment(err));
              process.exit(0);
            }
          })();
          EOF

      - name: Post review comment to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT=$(cat /tmp/review_comment.txt)
          gh pr comment "$PR_NUMBER" --body "$COMMENT"

      - name: Fail workflow if tests failed
        if: always()
        run: |
          if [ "${TEST_EXIT_CODE}" != "0" ]; then
            echo "❌ Tests failed. Blocking merge."
            exit 1
          fi

          echo "✅ Tests passed."