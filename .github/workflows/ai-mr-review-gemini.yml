name: 🤖 AI MR Review (ISTQB-Based — Gemini)

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review (Gemini)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.js' '*.ts' '*.jsx' '*.tsx' '*.mjs' '*.cjs' | head -c 8000)
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -50 | tr '\n' ', ')

          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV
          echo "$DIFF" > /tmp/pr_diff.txt

      - name: Run AI Review (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          node << 'EOF'
          const { GoogleGenerativeAI } = require("@google/generative-ai");
          const fs = require("fs");

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
          const diff = fs.readFileSync("/tmp/pr_diff.txt", "utf8");

          const prompt = `You are a Senior QA Engineer and Code Reviewer with deep expertise in ISTQB standards, STLC methodology, and Node.js / TypeScript best practices.

          ## PR Context
          - **Title:** ${process.env.PR_TITLE}
          - **Author:** ${process.env.PR_AUTHOR}
          - **Branch:** \`${process.env.HEAD_BRANCH}\` → \`${process.env.BASE_BRANCH}\`
          - **Changed Files:** ${process.env.CHANGED_FILES || "N/A"}
          - **Description:** ${process.env.PR_BODY || "_(no description provided)_"}

          ## Code Diff
          \`\`\`diff
          ${diff || "_(no diff available)_"}
          \`\`\`

          ---

          Review this PR across the following dimensions. Format your response in clean Markdown suitable for a GitHub PR comment.

          ### 1. 🎯 Change Summary
          Briefly summarize what this PR changes and what modules/components are affected.

          ### 2. 🧪 Test Coverage Assessment (ISTQB)
          - Are unit tests added/updated for changed logic?
          - Are happy path, negative, boundary value (BVA), and edge cases covered?
          - Are assertions specific or too loose?
          - List any **missing test scenarios**.

          ### 3. 🔍 Code Quality
          - Logic correctness and error handling
          - Null/undefined safety
          - DRY and SOLID compliance
          - Readability and naming clarity
          - Performance concerns

          ### 4. 🔐 Security Checklist (OWASP-Aware)
          Flag any: input validation gaps, hardcoded secrets, auth/authz issues, injection vectors, XSS risks.

          ### 5. 🚦 Review Verdict

          **Overall Risk:** [Low / Medium / High / Critical]

          **Status:** [✅ Approved | ⚠️ Approved with Comments | ❌ Changes Requested]

          **🚫 Blocking Issues (must fix before merge):**
          - (list or "None")

          **💡 Suggestions (non-blocking):**
          - (list or "None")

          **👍 What's done well:**
          - (list positives)

          Keep the tone constructive and professional. Be concise but specific.`;

          // --- Error classification ---
          function classifyError(err) {
            const msg = err.message || "";
            if (msg.includes("429") || msg.toLowerCase().includes("rate limit") || msg.toLowerCase().includes("quota")) {
              return "rate_limit";
            }
            if (msg.includes("400") || msg.toLowerCase().includes("invalid") || msg.toLowerCase().includes("api key")) {
              return "auth";
            }
            if (msg.includes("500") || msg.includes("503") || msg.toLowerCase().includes("unavailable")) {
              return "server";
            }
            return "unknown";
          }

          // --- Retry with exponential backoff ---
          async function callGeminiWithRetry(modelName, maxRetries = 3) {
            let lastErr;
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                console.log(`⏳ Attempt ${attempt}/${maxRetries} using model: ${modelName}`);
                const model = genAI.getGenerativeModel({ model: modelName });
                const result = await model.generateContent(prompt);
                return result.response.text();
              } catch (err) {
                lastErr = err;
                const type = classifyError(err);
                console.error(`❌ Attempt ${attempt} failed [${type}]: ${err.message}`);

                if (type === "auth") {
                  // No point retrying auth errors
                  throw err;
                }

                if (attempt < maxRetries) {
                  // Exponential backoff: 10s, 30s, 60s
                  const waitMs = [10000, 30000, 60000][attempt - 1] || 60000;
                  console.log(`⏱️ Waiting ${waitMs / 1000}s before retry...`);
                  await new Promise(r => setTimeout(r, waitMs));
                }
              }
            }
            throw lastErr;
          }

          // --- Fallback: try flash first, then pro if flash fails ---
          async function runReview() {
            let review;
            try {
              review = await callGeminiWithRetry("gemini-3-flash", 3);
            } catch (flashErr) {
              console.warn("⚠️ gemini-1.5-flash failed, trying gemini-1.5-pro as fallback...");
              try {
                review = await callGeminiWithRetry("gemini-3-pro", 2);
              } catch (proErr) {
                throw proErr;
              }
            }
            return review;
          }

          // --- Build error comment based on error type ---
          function buildErrorComment(err) {
            const type = classifyError(err);
            const messages = {
              rate_limit: `> ⚠️ **Rate limit reached** — Gemini free tier quota exceeded (15 req/min or 1500 req/day).\n> Workflow retried 3× with exponential backoff but still failed.\n> The review will run automatically on the next push to this PR.\n\n**Tip:** If this happens often, consider upgrading to a paid Gemini API plan.`,
              auth:       `> ❌ **Authentication error** — \`GEMINI_API_KEY\` is missing or invalid.\n> Please check: **Repo → Settings → Secrets → GEMINI_API_KEY**`,
              server:     `> 🔴 **Gemini API is temporarily unavailable** (5xx error).\n> This is Google's side — the review will run automatically on the next push.`,
              unknown:    `> ⚠️ **Unexpected error** — please check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions) for details.\n\n\`\`\`\n${err.message}\n\`\`\``
            };
            return `## 🤖 AI Code Review — ISTQB-Based (Gemini)\n\n${messages[type] || messages.unknown}\n\n---\n<sub>Failed on commit \`${{ github.sha }}\` · Workflow: \`ai-mr-review-gemini\`</sub>`;
          }

          // --- Main ---
          (async () => {
            try {
              const review = await runReview();
              const comment = `## 🤖 AI Code Review — ISTQB-Based (Gemini)\n\n> _Automated review powered by Google Gemini. This is a quality gate, not a replacement for human review._\n\n---\n\n${review}\n\n---\n<sub>Generated on commit \`${{ github.sha }}\` · Workflow: \`ai-mr-review-gemini\`</sub>`;
              fs.writeFileSync("/tmp/review_comment.txt", comment);
              console.log("✅ Review generated successfully.");
            } catch (err) {
              console.error("❌ All attempts failed:", err.message);
              fs.writeFileSync("/tmp/review_comment.txt", buildErrorComment(err));
              // Exit 0 so the workflow posts the error comment instead of silently failing
              process.exit(0);
            }
          })();
          EOF

      - name: Post review comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT=$(cat /tmp/review_comment.txt)
          gh pr comment "$PR_NUMBER" --body "$COMMENT"
