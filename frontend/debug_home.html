    <!-- Your custom JS script (that initializes Select2) -->
    <script>
        $(document).ready(function () {
            // Inisialisasi Select2 dengan AJAX
            $('#employee_name').select2({
                placeholder: "Cari nama karyawan...",
                allowClear: true, // Menambahkan tombol clear
                ajax: {
                    url: 'https://management.dparagon.com/hrd/alpha-alert', // URL ke route pencarian
                    dataType: 'json',
                    delay: 250, // Delay untuk pencarian (untuk menghindari pencarian berlebihan)
                    data: function (params) {
                        return {
                            search: params.term, // Mengirimkan query pencarian (term)
                        };
                    },
                    processResults: function (data) {
                        // Proses hasil dari API dan format untuk Select2
                        return {
                            results: data.items.map(function (item) {
                                return {
                                    id: item.id,
                                    text: item.name, // Menampilkan nama karyawan
                                };
                            }),
                            pagination: {
                                more: data.pagination && data.pagination.more // Menambahkan pagination jika ada
                            }
                        };
                    },
                    cache: false // Menonaktifkan cache agar hasil pencarian selalu terbaru
                },
                minimumInputLength: 2, // Minimal input sebelum pencarian dimulai
                multiple: false, // Nonaktifkan pemilihan ganda (single selection)
                theme: "classic", // Tampilan classic (opsional, bisa diubah)
                width: '100%', // Menyesuaikan lebar Select2
                dropdownAutoWidth: true, // Otomatis menyesuaikan lebar dropdown
                placeholder: "Pilih karyawan",
                allowClear: true // Untuk tombol clear
            });

            // Menangani aksi setelah memilih
            $('#employee_name').on('select2:select', function (e) {
                var selectedId = e.params.data.id; // Mendapatkan ID yang dipilih
                var selectedText = e.params.data.text; // Mendapatkan teks yang dipilih
                console.log('ID Terpilih: ' + selectedId + ', Nama: ' + selectedText);
            });
        });
    </script>

                const placeholder = $this.attr('data-placeholder');
                const select2Option = {width: '100%'};

                if (placeholder && $(this).find('option[value=""]').length)
                    select2Option.placeholder = placeholder;

        function centerModal() {
            $(this).css('display', 'block');
            var $dialog = $(this).find(".modal-dialog"),
                offset = ($(window).height() - $dialog.height()) / 2,
                bottomMargin = parseInt($dialog.css('marginBottom'), 10);

            // Make sure you don't hide the top part of the modal w/ a negative margin if it's longer than the screen height, and keep the margin equal to the bottom margin of the modal
            if (offset < bottomMargin) offset = bottomMargin;
            $dialog.css("margin-top", offset);
        }

        $(document).on('show.bs.modal', '.modal', centerModal);
        $(window).on("resize", function () {
            $('.modal:visible').each(centerModal);
        });

        $('.input-mask-price').each(function () {
            $(this).inputmask({
                alias: 'decimal',
                rightAlign: false,
                groupSeparator: '.',
                autoGroup: true
            });
        });
    });
</script>
