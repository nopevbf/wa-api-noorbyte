<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifying... | NoorByteAPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-slate-50 font-['Inter'] h-screen flex flex-col items-center justify-center text-slate-900"
  >
    <div
      class="bg-white p-10 rounded-2xl shadow-xl border border-slate-200 text-center max-w-sm w-full mx-4 relative overflow-hidden"
    >
      <div id="loadingState">
        <span
          class="material-symbols-outlined text-blue-600 text-6xl animate-spin mb-4"
          >autorenew</span
        >
        <h2 class="text-xl font-extrabold tracking-tight mb-2">
          Authenticating
        </h2>
        <p class="text-sm text-slate-500">
          Securing your session, please wait...
        </p>
      </div>

      <div id="errorState" class="hidden">
        <span class="material-symbols-outlined text-red-500 text-6xl mb-4"
          >error</span
        >
        <h2 class="text-xl font-extrabold tracking-tight mb-2">
          Verification Failed
        </h2>
        <p id="errorMsg" class="text-sm text-slate-500 mb-6">
          Link invalid or expired.
        </p>
        <a
          href="/login"
          class="px-6 py-2.5 bg-slate-900 text-white rounded-lg text-sm font-bold shadow-md hover:bg-slate-800 transition-colors"
          >Back to Login</a
        >
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // 1. Ambil token dari URL (contoh: /verify?token=abcde)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");

        if (!token) return showError("Token tidak ditemukan di URL.");

        try {
          // 2. Kirim token ke Backend untuk diverifikasi
          const response = await fetch(
            "http://localhost:3000/api/auth/verify",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token }),
            },
          );

          const result = await response.json();

          if (response.ok && result.status) {
            // 3. LOGIN BERHASIL! Simpan data user ke memori Browser
            localStorage.setItem("noorbyte_session", result.data.api_key);
            localStorage.setItem("noorbyte_username", result.data.username);
            localStorage.setItem("noorbyte_phone", result.data.phone);

            // 4. Redirect ke Dashboard
            window.location.href = "/dashboard";
          } else {
            showError(result.message || "Gagal memverifikasi link.");
          }
        } catch (error) {
          showError("Koneksi ke server gagal.");
        }
      });

      function showError(msg) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("errorState").classList.remove("hidden");
        document.getElementById("errorMsg").innerText = msg;
      }
    </script>
  </body>
</html>
