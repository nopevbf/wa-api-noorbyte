<aside
  id="app-sidebar"
  class="w-64 h-full border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 ease-in-out"
>
  <div class="p-6 flex flex-col gap-6 flex-1">
    <div class="flex items-center gap-3">
      <div
        class="bg-primary size-10 rounded-lg flex items-center justify-center text-white"
      >
        <span class="material-symbols-outlined">api</span>
      </div>
      <div class="flex flex-col">
        <h1 class="text-base font-bold leading-none">ConnectAPI</h1>
        <span
          class="text-[10px] font-bold tracking-wider text-primary bg-primary/10 px-1.5 py-0.5 rounded mt-1 w-fit"
          >ADMIN PANEL</span
        >
      </div>
      <!-- Tombol close untuk mobile -->
      <button
        id="closeSidebarBtn"
        class="lg:hidden ml-auto p-1 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <nav id="sidebar-nav" class="flex flex-col gap-1">
      <a
        href="/dashboard"
        data-path="/dashboard"
        class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
      >
        <span class="material-symbols-outlined text-xl icon">dashboard</span>
        <span class="text-sm font-medium">Dashboard</span>
      </a>
      <a
        href="/devices"
        data-path="/devices"
        class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
      >
        <span class="material-symbols-outlined text-xl icon"
          >important_devices</span
        >
        <span class="text-sm font-semibold">Devices</span>
      </a>
      <a
        href="/groups"
        data-path="/groups"
        class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
      >
        <span class="material-symbols-outlined icon text-xl">group</span>
        <span class="text-sm font-semibold">WhatsApp Groups</span>
      </a>
      <a
        href="/tester"
        data-path="/tester"
        class="nav-link flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
      >
        <span class="material-symbols-outlined icon">send</span>
        <span class="text-sm font-medium">Web Tester</span>
      </a>
      <a
        href="/automation"
        data-path="/automation"
        class="nav-link flex items-center gap-3 px-3 py-2.5 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
      >
        <span
          class="material-symbols-outlined icon"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >assessment</span
        >
        <span class="text-sm font-semibold">Daily Reports</span>
      </a>
    </nav>
    <div class="mt-auto p-4 border-t border-slate-100 dark:border-slate-800">
      <button
        id="btnLogout"
        class="flex items-center gap-3 px-3 py-2.5 w-full rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors group"
      >
        <span
          class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1"
          >logout</span
        >
        <span class="text-sm font-semibold">Logout</span>
      </button>
    </div>
  </div>
</aside>

<div
  id="logoutConfirmModal"
  class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex justify-center items-center transition-all duration-300 opacity-0"
>
  <div
    class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl p-8 text-center max-w-sm w-full mx-4 border border-slate-200 dark:border-slate-800 transform scale-95 transition-all duration-300"
    id="logoutModalContent"
  >
    <div
      class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-50 dark:bg-red-900/20 mb-6"
    >
      <span class="material-symbols-outlined text-3xl text-red-500"
        >logout</span
      >
    </div>
    <h3 class="font-extrabold text-xl mb-2 text-slate-900 dark:text-white">
      Keluar dari Sistem?
    </h3>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">
      Sesi Anda akan diakhiri dan Anda harus login kembali melalui WhatsApp
      untuk mengakses dashboard.
    </p>

    <div class="flex gap-3">
      <button
        id="btnCancelLogout"
        class="flex-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold py-3.5 px-4 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-[0.98] transition-all"
      >
        Batal
      </button>
      <button
        id="btnConfirmLogout"
        class="flex-1 bg-red-500 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-red-600 shadow-lg shadow-red-500/20 active:scale-[0.98] transition-all"
      >
        Ya, Keluar
      </button>
    </div>
  </div>
</div>

<!-- Backdrop transparan untuk mode mobile -->
<div
  id="sidebar-backdrop"
  class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"
></div>
