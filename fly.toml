app = 'wa-api-noorbyte'
primary_region = 'sin'

[build]

[env]
  PORT = '3000'
  DB_PATH = '/data/database.db'
  SESSION_PATH = '/data/sessions'

[mounts]
  source = 'wa_data'
  destination = '/data'
  initial_size = '3gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
